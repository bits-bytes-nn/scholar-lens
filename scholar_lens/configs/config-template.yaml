resources:
  project_name: scholar-lens
  stage: dev
  profile_name:
  default_region_name: ap-northeast-2
  bedrock_region_name: us-west-2
  s3_bucket_name:
  s3_prefix: scholar-lens
  vpc_id:
  subnet_ids:
  email_address:
  github:
    enabled: false
    repo_name:
    base_branch: main
    branch_prefix: paper-reviews
    author_name: Scholar Lens Bot
    author_email:
    # Primary category label per artifact type — the value a blog's category
    # tabs filter on. Override to match your blog (e.g. a Jekyll site whose
    # summary tab reads site.categories['Summaries'] would set summary_category
    # to "Summaries"). Defaults below are the generic labels.
    review_category: Paper Reviews
    summary_category: Paper Summaries
    tech_guide_category: Tech Guides
    # Cover image filename (under the blog's assets/images dir) used when no
    # category-specific entry matches. Category slugs are lowercase, hyphenated.
    default_cover_image: default.jpg
    cover_images:
      # language-models: language-models.jpg
      # multimodal-learning: multimodal-learning.jpg

paper:
  figure_analysis_model_id: anthropic.claude-3-haiku-20240307-v1:0
  citation_extraction_model_id: anthropic.claude-sonnet-5
  attributes_extraction_model_id: anthropic.claude-haiku-4-5-20251001-v1:0
  table_of_contents_model_id: anthropic.claude-sonnet-5
  output_fixing_model_id: anthropic.claude-sonnet-5

code:
  code_analysis_model_id: anthropic.claude-haiku-4-5-20251001-v1:0
  code_summarization_model_id: anthropic.claude-haiku-4-5-20251001-v1:0
  embed_model_id: amazon.titan-embed-text-v2:0
  chunk_size: 8192
  chunk_overlap: 1024

citations:
  citation_summarization_model_id: anthropic.claude-haiku-4-5-20251001-v1:0
  citation_analysis_model_id: anthropic.claude-haiku-4-5-20251001-v1:0

explanation:
  paper_analysis_model_id: anthropic.claude-sonnet-5
  paper_enrichment_model_id: anthropic.claude-sonnet-5
  paper_finalization_model_id: anthropic.claude-haiku-4-5-20251001-v1:0
  paper_evaluation_model_id: anthropic.claude-opus-4-8
  paper_synthesis_model_id: anthropic.claude-opus-4-8
  evaluator_enable_thinking: True
  synthesizer_enable_thinking: True
  # Adaptive-thinking effort (low|medium|high) for Opus 4.8+. 'low' is much
  # faster/cheaper for the per-paragraph synthesis loop; raise for max depth.
  thinking_effort: low

# Concise paper-summary mode (--mode summarize)
summary:
  summary_model_id: anthropic.claude-opus-4-8
  summarizer_enable_thinking: True
  thinking_effort: medium

# Technical guide / tutorial generator (scholar_lens.tech_guide_main)
tech_guide:
  relevance_model_id: anthropic.claude-haiku-4-5-20251001-v1:0
  synopsis_model_id: anthropic.claude-sonnet-5
  writing_model_id: anthropic.claude-opus-4-8
  evaluation_model_id: anthropic.claude-opus-4-8
  writer_enable_thinking: True
  thinking_effort: medium
  verify_grounding: True
  # Deep research: derive web-search queries from the seed docs (needs Tavily or
  # Brave) and fetch the top result pages into the corpus so they reach the writer.
  auto_research: True
  max_research_queries: 6
  fetch_top_results: 4
  # Per-section evaluate-and-revise loop.
  min_quality_score: 75
  max_revision_attempts: 2
  # Hard total-token ceiling for one guide run (omit / null = no limit).
  # max_total_tokens: 4000000

# Output language for generated reviews/summaries/guides (e.g. Korean, English)
output_language: Korean
